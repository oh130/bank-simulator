spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bank_simulator?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: bankuser
    password: bankpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 개발 환경: 자동으로 테이블 생성/수정
    show-sql: true              # SQL 쿼리 콘솔 출력 (개발용)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

# JWT 설정
jwt:
  secret: bank-simulator-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000          # 24시간 (밀리초)

logging:
  level:
    com.banksimulator: DEBUG
    org.springframework.security: DEBUG
